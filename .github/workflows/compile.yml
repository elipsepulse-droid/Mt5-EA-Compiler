name: MT5 EA Compile + Backtest

on:
  workflow_dispatch:

jobs:
  mt5-build:
    runs-on: windows-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download MetaTrader 5
      shell: powershell
      run: |
        Invoke-WebRequest https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe -OutFile mt5setup.exe

    - name: Install MetaTrader 5
      shell: powershell
      run: |
        Start-Process -FilePath .\mt5setup.exe -ArgumentList "/auto" -Wait

    - name: Detect MT5 data directory
      shell: powershell
      run: |
        $terminalRoot="$env:APPDATA\MetaQuotes\Terminal"
        $terminalDir=Get-ChildItem $terminalRoot | Select-Object -First 1
        $dataPath="$terminalRoot\$($terminalDir.Name)\MQL5\Experts"

        New-Item -ItemType Directory -Force -Path $dataPath

        Copy-Item EA_DANE_AUTO_BOT2.mq5 $dataPath\EA_DANE_AUTO_BOT2.mq5

        echo "EA_FILE=$dataPath\EA_DANE_AUTO_BOT2.mq5" >> $env:GITHUB_ENV
        echo "DATA_PATH=$dataPath" >> $env:GITHUB_ENV

    - name: Compile EA
      shell: powershell
      run: |
        $metaEditor="C:\Program Files\MetaTrader 5\metaeditor64.exe"
        & $metaEditor /compile:"$env:EA_FILE" /log:compile.log

    - name: Show compilation log
      shell: powershell
      run: |
        Get-Content compile.log

    - name: Locate EX5
      shell: powershell
      run: |
        $file=Get-ChildItem "$env:APPDATA\MetaQuotes\Terminal" -Recurse -Filter *.ex5 | Select-Object -First 1

        if($file){
          New-Item -ItemType Directory -Force -Path compiled
          Copy-Item $file.FullName compiled\
        } else {
          Write-Error "EX5 file not generated"
          exit 1
        }

    - name: Create Strategy Tester configuration
      shell: powershell
      run: |
        @"
[Common]
Login=0
Password=
Server=

[Tester]
Expert=EA_DANE_AUTO_BOT2
Symbol=XAUUSD
Period=M5
Model=0
FromDate=2022.01.01
ToDate=2025.01.01
Deposit=10000
Currency=USD
Leverage=100
ExecutionMode=0
Optimization=0
Report=github_backtest
ReplaceReport=1
ShutdownTerminal=1
"@ | Out-File tester.ini -Encoding ASCII

    - name: Run Strategy Tester
      shell: powershell
      run: |
        $terminal="C:\Program Files\MetaTrader 5\terminal64.exe"
        & $terminal /portable /config:tester.ini
        Start-Sleep -Seconds 20

    - name: Collect backtest results
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path results

        Get-ChildItem "$env:USERPROFILE" -Recurse -Include github_backtest*.html,github_backtest*.xml,github_backtest*.csv -ErrorAction SilentlyContinue |
        Copy-Item -Destination results -Force

    - name: Upload compiled EA
      uses: actions/upload-artifact@v4
      with:
        name: compiled-ex5
        path: compiled

    - name: Upload backtest results
      uses: actions/upload-artifact@v4
      with:
        name: backtest-results
        path: results
        if-no-files-found: ignore
