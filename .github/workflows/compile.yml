name: MT5 EA Compile

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download MetaTrader 5
      run: |
        Invoke-WebRequest https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe -OutFile mt5setup.exe

    - name: Install MetaTrader 5
      run: |
        Start-Process -FilePath .\mt5setup.exe -ArgumentList "/auto" -Wait

    - name: Locate MetaEditor
      run: |
        $editor="C:\Program Files\MetaTrader 5\metaeditor64.exe"
        echo "METAEDITOR=$editor" >> $env:GITHUB_ENV

    - name: Detect MT5 Data Folder
      run: |
        $root="$env:APPDATA\MetaQuotes\Terminal"
        $folder=Get-ChildItem $root | Where-Object {$_.PSIsContainer} | Select-Object -First 1
        $data="$root\$($folder.Name)"
        $mql="$data\MQL5"

        echo "MT5DATA=$data" >> $env:GITHUB_ENV
        echo "MQLPATH=$mql" >> $env:GITHUB_ENV

    - name: Copy EA into terminal
      run: |
        $experts="$env:MQLPATH\Experts"
        New-Item -ItemType Directory -Force -Path $experts
        Copy-Item EA_DANE_AUTO_BOT2.mq5 "$experts\EA_DANE_AUTO_BOT2.mq5"

    - name: Compile Expert Advisor
      run: |
        & "$env:METAEDITOR" /portable /compile:"$env:MQLPATH\Experts\EA_DANE_AUTO_BOT2.mq5" /log:compile.log

    - name: Show compiler log
      run: |
        Get-Content compile.log

    - name: Collect compiled EX5
      run: |
        $file = Get-ChildItem "$env:MQLPATH\Experts" -Filter *.ex5 -Recurse
        if($file){
          New-Item -ItemType Directory -Force -Path compiled
          Copy-Item $file.FullName compiled\
        }
        else{
          Write-Error "Compilation failed"
          exit 1
        }

    - name: Upload compiled EA
      uses: actions/upload-artifact@v4
      with:
        name: compiled-ea
        path: compiled
