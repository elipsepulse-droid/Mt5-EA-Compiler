name: Compile MT5 EA

on:
  push:
    paths:
      - '**.mq5'
      - '.github/workflows/compile.yml'
  pull_request:
    paths:
      - '**.mq5'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download MetaTrader 5 Installer
      shell: pwsh
      run: |
        $url = "https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe"
        for ($i = 1; $i -le 3; $i++) {
          try {
            Write-Host "Download attempt $i..."
            Invoke-WebRequest $url -OutFile mt5setup.exe -TimeoutSec 120
            Write-Host "Downloaded OK."
            break
          } catch {
            Write-Warning "Attempt $i failed: $_"
            if ($i -eq 3) { throw "MT5 download failed." }
            Start-Sleep -Seconds 10
          }
        }

    - name: Install MetaTrader 5
      shell: pwsh
      run: |
        Start-Process -FilePath .\mt5setup.exe -ArgumentList "/auto" -PassThru | Out-Null
        $editorPath = $null
        $timeout = 120
        $elapsed = 0
        while ($elapsed -lt $timeout) {
          Start-Sleep -Seconds 5
          $elapsed += 5
          $candidates = @(
            "C:\Program Files\MetaTrader 5\metaeditor64.exe",
            "$env:ProgramFiles\MetaTrader 5\metaeditor64.exe",
            "$env:LOCALAPPDATA\Programs\MetaTrader 5\metaeditor64.exe"
          )
          foreach ($c in $candidates) {
            if (Test-Path $c) { $editorPath = $c; break }
          }
          if ($editorPath) { break }
          Write-Host "Waiting for MetaEditor... ($elapsed/$timeout sec)"
        }
        if (-not $editorPath) {
          $found = Get-ChildItem "C:\" -Recurse -Filter "metaeditor64.exe" `
                                 -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($found) { $editorPath = $found.FullName }
        }
        if (-not $editorPath) {
          Write-Error "MetaEditor not found."
          exit 1
        }
        Write-Host "MetaEditor: $editorPath"
        $installDir = Split-Path $editorPath
        echo "METAEDITOR=$editorPath" >> $env:GITHUB_ENV
        echo "MT5_DIR=$installDir"    >> $env:GITHUB_ENV

    # ---------------------------------------------------------------
    # Copy Trade.mqh to EVERY possible Include location MetaEditor
    # might look — Common MQL5, all terminal-specific folders, and
    # the MetaEditor install dir itself.
    # ---------------------------------------------------------------
    - name: Prepare MQL5 folder structure and Trade library
      shell: pwsh
      run: |
        $stubSrc = ".github\mql5-stub\Trade\Trade.mqh"
        if (-not (Test-Path $stubSrc)) {
          Write-Error "Trade.mqh stub not found at $stubSrc"
          exit 1
        }
        Write-Host "Stub found: $stubSrc"

        # 1. Common MQL5 path
        $commonInclude = "$env:APPDATA\MetaQuotes\Terminal\Common\MQL5\Include\Trade"
        New-Item -ItemType Directory -Force $commonInclude | Out-Null
        Copy-Item -Force $stubSrc "$commonInclude\Trade.mqh"
        Write-Host "Copied to Common: $commonInclude"

        # 2. ALL terminal-specific folders (the one MetaEditor actually uses)
        #    Path: AppData\Roaming\MetaQuotes\Terminal\<HASH>\MQL5\Include\Trade\
        $terminalRoot = "$env:APPDATA\MetaQuotes\Terminal"
        if (Test-Path $terminalRoot) {
          $terminalDirs = Get-ChildItem $terminalRoot -Directory -ErrorAction SilentlyContinue
          foreach ($dir in $terminalDirs) {
            $incPath = "$($dir.FullName)\MQL5\Include\Trade"
            New-Item -ItemType Directory -Force $incPath | Out-Null
            Copy-Item -Force $stubSrc "$incPath\Trade.mqh"
            Write-Host "Copied to terminal: $incPath"
          }
        }

        # 3. MetaEditor install directory Include folder
        $editorInclude = Join-Path $env:MT5_DIR "MQL5\Include\Trade"
        New-Item -ItemType Directory -Force $editorInclude | Out-Null
        Copy-Item -Force $stubSrc "$editorInclude\Trade.mqh"
        Write-Host "Copied to editor dir: $editorInclude"

        # 4. Also copy to Program Files MT5 Include if it exists
        $pfInclude = "C:\Program Files\MetaTrader 5\MQL5\Include\Trade"
        if (Test-Path "C:\Program Files\MetaTrader 5") {
          New-Item -ItemType Directory -Force $pfInclude | Out-Null
          Copy-Item -Force $stubSrc "$pfInclude\Trade.mqh"
          Write-Host "Copied to Program Files: $pfInclude"
        }

        Write-Host "Trade.mqh deployed to all Include locations."

        # Set up Experts folder and copy EA
        $mql = "$env:APPDATA\MetaQuotes\Terminal\Common\MQL5"
        New-Item -ItemType Directory -Force "$mql\Experts" | Out-Null

        $ea = Get-ChildItem "." -Filter "*.mq5" | Select-Object -First 1
        if (-not $ea) {
          Write-Error "No .mq5 file found in repo root."
          exit 1
        }
        Write-Host "EA: $($ea.Name)"
        Copy-Item $ea.FullName "$mql\Experts\$($ea.Name)" -Force

        echo "MQLPATH=$mql"            >> $env:GITHUB_ENV
        echo "EA_NAME=$($ea.Name)"     >> $env:GITHUB_ENV
        echo "EA_BASE=$($ea.BaseName)" >> $env:GITHUB_ENV

    - name: Compile EA with MetaEditor
      shell: pwsh
      run: |
        $src = "$env:MQLPATH\Experts\$env:EA_NAME"
        $log = "$env:GITHUB_WORKSPACE\compile.log"
        Write-Host "Source : $src"
        Write-Host "Log    : $log"
        $proc = Start-Process -FilePath "$env:METAEDITOR" `
                              -ArgumentList "/compile:`"$src`"","/log:`"$log`"" `
                              -Wait -PassThru -NoNewWindow
        Write-Host "MetaEditor exit code: $($proc.ExitCode)"
        Start-Sleep -Seconds 3
        if (Test-Path $log) {
          Write-Host "--- RAW COMPILE LOG ---"
          Get-Content $log -Encoding Unicode
        } else {
          Write-Warning "No compile log produced."
        }

    # ---------------------------------------------------------------
    # FIX: No backslash regex or subexpressions inside strings
    # All Select-String patterns use only simple literal strings
    # ---------------------------------------------------------------
    - name: Parse Compile Results
      shell: pwsh
      run: |
        $log = "$env:GITHUB_WORKSPACE\compile.log"
        if (-not (Test-Path $log)) {
          Write-Warning "No compile log found."
          exit 0
        }

        $lines        = Get-Content $log -Encoding Unicode
        $errorLines   = $lines | Where-Object { $_ -match ": error" }
        $warningLines = $lines | Where-Object { $_ -match ": warning" }
        $errorCount   = @($errorLines).Count
        $warningCount = @($warningLines).Count

        $srcPath  = "$env:MQLPATH\Experts\$env:EA_NAME"
        $srcLines = Get-Content $srcPath -ErrorAction SilentlyContinue
        $lineCount = @($srcLines).Count

        $inputCount   = ($srcLines | Select-String "input "    ).Count
        $buyCount     = ($srcLines | Select-String "ORDER_TYPE_BUY"  ).Count
        $sellCount    = ($srcLines | Select-String "ORDER_TYPE_SELL" ).Count
        $includeCount = ($srcLines | Select-String "#include"        ).Count
        $osCount      = ($srcLines | Select-String "OrderSend"       ).Count

        Write-Host ""
        Write-Host "================ CODE METRICS ================"
        Write-Host "Total lines     : $lineCount"
        Write-Host "Input params    : $inputCount"
        Write-Host "OrderSend calls : $osCount"
        Write-Host "BUY references  : $buyCount"
        Write-Host "SELL references : $sellCount"
        Write-Host "Include files   : $includeCount"

        Write-Host ""
        Write-Host "================ ERRORS ($errorCount) ================"
        foreach ($e in $errorLines) { Write-Host $e }

        Write-Host ""
        Write-Host "================ WARNINGS ($warningCount) ================"
        foreach ($w in $warningLines) { Write-Host $w }

        Write-Host ""
        Write-Host "================ SUMMARY ================"
        Write-Host "Errors   : $errorCount"
        Write-Host "Warnings : $warningCount"
        if ($errorCount -gt 0) {
          Write-Error "Compilation failed with $errorCount error(s)."
          exit 1
        }
        Write-Host "SUCCESS - Compiled with no errors."

    - name: Find and collect EX5
      shell: pwsh
      run: |
        $ex5 = $null
        $searchPaths = @(
          "$env:MQLPATH\Experts",
          "$env:APPDATA\MetaQuotes\Terminal\Common\MQL5\Experts"
        )
        foreach ($p in $searchPaths) {
          $f = Get-ChildItem $p -Filter "*.ex5" -Recurse -ErrorAction SilentlyContinue |
               Select-Object -First 1
          if ($f) { $ex5 = $f; break }
        }
        if ($ex5) {
          Write-Host "EX5 found: $($ex5.FullName)"
          New-Item -ItemType Directory -Force compiled | Out-Null
          Copy-Item $ex5.FullName "compiled\$env:EA_BASE.ex5" -Force
        } else {
          Write-Error "EX5 not found."
          exit 1
        }

    - name: Upload EX5 artifact
      uses: actions/upload-artifact@v4
      with:
        name: compiled-ea-${{ github.run_number }}
        path: compiled/
        if-no-files-found: error
