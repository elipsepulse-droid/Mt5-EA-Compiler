name: MT5 EA Compile

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Download MetaTrader 5
      run: |
        Invoke-WebRequest https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe -OutFile mt5setup.exe

    - name: Install MetaTrader 5
      run: |
        Start-Process -FilePath .\mt5setup.exe -ArgumentList "/auto" -Wait

    - name: Locate MetaEditor
      id: locate
      run: |
        $path1 = "C:\Program Files\MetaTrader 5\metaeditor64.exe"
        $path2 = "C:\Program Files (x86)\MetaTrader 5\metaeditor.exe"

        if (Test-Path $path1) {
            echo "METAEDITOR=$path1" >> $env:GITHUB_ENV
        }
        elseif (Test-Path $path2) {
            echo "METAEDITOR=$path2" >> $env:GITHUB_ENV
        }
        else {
            Write-Error "MetaEditor not found"
            exit 1
        }

    - name: Compile MQ5
      run: |
        mkdir compiled
        & "$env:METAEDITOR" /compile:EA_DANE_AUTO_BOT2.mq5 /log:compile.log

    - name: Search compiled EX5
      run: |
        $file = Get-ChildItem -Path . -Recurse -Filter *.ex5 | Select-Object -First 1
        if ($file) {
            Copy-Item $file.FullName compiled\
        } else {
            Write-Error "Compilation failed"
            exit 1
        }

    - name: Upload EX5 artifact
      uses: actions/upload-artifact@v4
      with:
        name: compiled-ea
        path: compiled/

    - name: Post Checkout repository
      run: echo "Build complete"
