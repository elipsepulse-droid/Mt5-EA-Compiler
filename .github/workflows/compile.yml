name: MT5 EA Compile

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install MetaTrader 5
      run: |
        Invoke-WebRequest https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe -OutFile mt5setup.exe
        Start-Process mt5setup.exe -ArgumentList "/silent" -Wait

    - name: Compile EA
      run: |
        $editor = "C:\Program Files\MetaTrader 5\metaeditor64.exe"
        & $editor /compile:"${{ github.workspace }}\EA_DANE_AUTO_BOT2.mq5"

    - name: Upload EX5
      uses: actions/upload-artifact@v4
      with:
        name: compiled-ea
        path: |
          **/*.ex5
