name: MT5 EA Compile

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download MetaTrader 5
      run: |
        Invoke-WebRequest https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe -OutFile mt5setup.exe

    - name: Install MetaTrader 5
      run: |
        Start-Process mt5setup.exe -ArgumentList "/silent" -Wait

    - name: Locate MetaEditor
      id: find_editor
      run: |
        $editor = "C:\Program Files\MetaTrader 5\metaeditor64.exe"
        if (Test-Path $editor) {
          echo "editor=$editor" >> $env:GITHUB_OUTPUT
        }

    - name: Compile MQ5
      run: |
        $editor="${{ steps.find_editor.outputs.editor }}"
        $source="${{ github.workspace }}\EA_DANE_AUTO_BOT2.mq5"
        & $editor /compile:$source /log

    - name: Search compiled EX5
      run: |
        Get-ChildItem -Path C:\ -Recurse -Filter *.ex5 -ErrorAction SilentlyContinue

    - name: Upload EX5 artifact
      uses: actions/upload-artifact@v4
      with:
        name: compiled-ea
        path: |
          C:\Users\runneradmin\AppData\Roaming\MetaQuotes\Terminal\**\MQL5\Experts\*.ex5
