name: Compile MT5 EA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download MetaTrader 5
      run: |
        Invoke-WebRequest https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe -OutFile mt5setup.exe

    - name: Install MT5
      run: |
        Start-Process -FilePath .\mt5setup.exe -ArgumentList "/auto" -Wait

    - name: Set MetaEditor
      run: |
        echo "METAEDITOR=C:\Program Files\MetaTrader 5\metaeditor64.exe" >> $env:GITHUB_ENV

    - name: Download MQL5 Include Library
      run: |
        git clone https://github.com/EA31337/EA31337-classes.git mql_lib

    - name: Prepare MQL5 folders
      run: |
        $mql="$env:USERPROFILE\AppData\Roaming\MetaQuotes\Terminal\Common\MQL5"
        New-Item -ItemType Directory -Force -Path "$mql\Experts"
        New-Item -ItemType Directory -Force -Path "$mql\Include"

        Copy-Item EA_DANE_AUTO_BOT2.mq5 "$mql\Experts\EA_DANE_AUTO_BOT2.mq5"
        Copy-Item -Recurse mql_lib\* "$mql\Include"

        echo "MQLPATH=$mql" >> $env:GITHUB_ENV

    - name: Compile EA
      run: |
        & "$env:METAEDITOR" /compile:"$env:MQLPATH\Experts\EA_DANE_AUTO_BOT2.mq5" /log:compile.log

    - name: Show compile log
      run: |
        Get-Content compile.log

    - name: Backtest Report Scanner
      shell: pwsh
      run: |

        Write-Host ""
        Write-Host "================ BACKTEST RESULT SCAN ================"

        $report = Get-ChildItem -Recurse -Filter "*.html" -ErrorAction SilentlyContinue | Select-Object -First 1

        if($report){

            Write-Host "Backtest report detected:"
            Write-Host $report.FullName

            $content = Get-Content $report.FullName

            $metrics = @(
              "Total Net Profit",
              "Gross Profit",
              "Gross Loss",
              "Profit Factor",
              "Expected Payoff",
              "Recovery Factor",
              "Sharpe Ratio",
              "Total Trades",
              "Long Trades",
              "Short Trades",
              "Balance Drawdown",
              "Equity Drawdown"
            )

            foreach($m in $metrics){
                $line = $content | Select-String $m | Select -First 1
                if($line){ Write-Host $line.Line }
            }

        }
        else{
            Write-Host "No backtest report found in runner environment"
        }

    - name: Find EX5
      run: |
        $file = Get-ChildItem "$env:MQLPATH\Experts" -Filter *.ex5 -Recurse
        if($file){
          New-Item -ItemType Directory -Force compiled
          Copy-Item $file.FullName compiled\
        } else {
          Write-Error "Compilation failed"
          exit 1
        }

    - name: Upload EX5
      uses: actions/upload-artifact@v4
      with:
        name: compiled-ea
        path: compiled
