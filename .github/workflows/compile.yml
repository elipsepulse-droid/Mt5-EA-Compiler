name: MT5 EA Compile + Analysis + Backtest Logs

on:
  workflow_dispatch:

jobs:
  mt5:
    runs-on: windows-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download MT5
        shell: pwsh
        run: |
          Invoke-WebRequest https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe -OutFile mt5setup.exe

      - name: Install MT5
        shell: pwsh
        run: |
          Start-Process -FilePath .\mt5setup.exe -ArgumentList "/auto" -Wait

      - name: Prepare MT5 Data Folder
        shell: pwsh
        run: |

          $terminalFolder = Get-ChildItem "$env:USERPROFILE\AppData\Roaming\MetaQuotes\Terminal" | Select-Object -First 1
          $mql="$env:USERPROFILE\AppData\Roaming\MetaQuotes\Terminal\$($terminalFolder.Name)\MQL5"

          New-Item -ItemType Directory -Force "$mql\Experts"

          Copy-Item *.mq5 "$mql\Experts\" -Force

          echo "MQLPATH=$mql" >> $env:GITHUB_ENV
          echo "TERMINAL=C:\Program Files\MetaTrader 5\terminal64.exe" >> $env:GITHUB_ENV
          echo "METAEDITOR=C:\Program Files\MetaTrader 5\metaeditor64.exe" >> $env:GITHUB_ENV

      - name: Compile EA
        shell: pwsh
        run: |

          $mq5 = Get-ChildItem "$env:MQLPATH\Experts\*.mq5" | Select-Object -First 1

          & "$env:METAEDITOR" /compile:$mq5.FullName /log:compile.log

      - name: Show Compile Log
        shell: pwsh
        run: |
          Get-Content compile.log

      - name: Static Code Analysis
        shell: pwsh
        run: |

          $file = Get-ChildItem "$env:MQLPATH\Experts\*.mq5" | Select-Object -First 1
          $code = Get-Content $file.FullName

          $lineCount = $code.Count
          $functionCount = ($code | Select-String -Pattern "OnInit|OnTick|OnTimer|OnDeinit").Count
          $includeCount = ($code | Select-String -Pattern "#include").Count
          $classCount = ($code | Select-String -Pattern "\bclass\b").Count
          $structCount = ($code | Select-String -Pattern "\bstruct\b").Count
          $enumCount = ($code | Select-String -Pattern "\benum\b").Count
          $inputCount = ($code | Select-String -Pattern "\binput\b").Count
          $globalCount = ($code | Select-String -Pattern "\bextern\b").Count

          $orderSendCount = ($code | Select-String -Pattern "OrderSend").Count
          $orderAsyncCount = ($code | Select-String -Pattern "OrderSendAsync").Count
          $buyCount = ($code | Select-String -Pattern "BUY").Count
          $sellCount = ($code | Select-String -Pattern "SELL").Count
          $closeCount = ($code | Select-String -Pattern "PositionClose").Count

          Write-Output "================ BASIC ANALYSIS ================"
          Write-Output "Total Lines: $lineCount"
          Write-Output "Function Count: $functionCount"
          Write-Output "Include Files: $includeCount"
          Write-Output "Classes: $classCount"
          Write-Output "Structures: $structCount"
          Write-Output "Enumerations: $enumCount"
          Write-Output "Global Variables: $globalCount"
          Write-Output "Input Parameters: $inputCount"

          Write-Output ""
          Write-Output "================ TRADING RISK ANALYSIS ================"
          Write-Output "OrderSend Calls: $orderSendCount"
          Write-Output "OrderSendAsync Calls: $orderAsyncCount"
          Write-Output "Buy Order Calls: $buyCount"
          Write-Output "Sell Order Calls: $sellCount"
          Write-Output "PositionClose Calls: $closeCount"

          if($orderSendCount -gt 5){
            Write-Output "Risk Flag: Grid strategy detected"
          }

      - name: Create Tester Config
        shell: pwsh
        run: |

          $config=@"
[Tester]
Expert=EA_DANE_AUTO_BOT2
Symbol=XAUUSD
Period=M5
Model=0
Optimization=0
FromDate=2023.01.01
ToDate=2024.01.01
Deposit=10000
Currency=USD
Leverage=100
ShutdownTerminal=1
"@

          $config | Out-File tester.ini -Encoding ASCII

      - name: Run Strategy Tester
        shell: pwsh
        run: |

          & "$env:TERMINAL" /portable /config:tester.ini

          Start-Sleep 90

      - name: Show Backtest Logs
        shell: pwsh
        run: |

          $logs = Get-ChildItem "$env:USERPROFILE\AppData\Roaming\MetaQuotes\Terminal" -Recurse -Filter *.log |
                  Sort-Object LastWriteTime -Descending |
                  Select-Object -First 5

          Write-Output ""
          Write-Output "================ BACKTEST LOGS ================"

          foreach($log in $logs){
            Write-Output ""
            Write-Output "Log File: $($log.FullName)"
            Get-Content $log.FullName -Tail 40
          }

      - name: Save EX5
        shell: pwsh
        run: |

          New-Item -ItemType Directory -Force compiled

          $ex5 = Get-ChildItem "$env:MQLPATH\Experts" -Filter *.ex5 -Recurse

          Copy-Item $ex5.FullName compiled\

      - name: Upload EX5
        uses: actions/upload-artifact@v4
        with:
          name: compiled-ex5
          path: compiled
