name: Compile MT5 EA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download MetaTrader 5
      run: |
        Invoke-WebRequest https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe -OutFile mt5setup.exe

    - name: Install MT5
      run: |
        Start-Process -FilePath .\mt5setup.exe -ArgumentList "/auto" -Wait

    - name: Set MetaEditor
      run: |
        echo "METAEDITOR=C:\Program Files\MetaTrader 5\metaeditor64.exe" >> $env:GITHUB_ENV
        echo "TERMINAL=C:\Program Files\MetaTrader 5\terminal64.exe" >> $env:GITHUB_ENV

    - name: Download MQL5 Include Library
      run: |
        git clone https://github.com/EA31337/EA31337-classes.git mql_lib

    - name: Prepare MQL5 folders
      run: |
        $mql="$env:USERPROFILE\AppData\Roaming\MetaQuotes\Terminal\Common\MQL5"
        New-Item -ItemType Directory -Force -Path "$mql\Experts"
        New-Item -ItemType Directory -Force -Path "$mql\Include"

        Copy-Item EA_DANE_AUTO_BOT2.mq5 "$mql\Experts\EA_DANE_AUTO_BOT2.mq5"
        Copy-Item -Recurse mql_lib\* "$mql\Include"

        echo "MQLPATH=$mql" >> $env:GITHUB_ENV

    - name: Compile EA
      run: |
        & "$env:METAEDITOR" /compile:"$env:MQLPATH\Experts\EA_DANE_AUTO_BOT2.mq5" /log:compile.log

    - name: Show log
      run: |
        Get-Content compile.log

    - name: Create Tester Config
      shell: pwsh
      run: |
        $config=@"
[Common]
Login=0
Password=
Server=
TestExpert=EA_DANE_AUTO_BOT2
Symbol=XAUUSD
Period=M5
Model=0
Optimization=0
FromDate=2022.01.01
ToDate=2025.01.01
Deposit=10000
Currency=USD
Leverage=100
Report=backtest
ReplaceReport=1
ShutdownTerminal=1
"@

        $config | Out-File tester.ini -Encoding ASCII
        Get-Content tester.ini

    - name: Run Strategy Tester
      shell: pwsh
      run: |
        $terminal="$env:TERMINAL"

        Start-Process `
        -FilePath $terminal `
        -ArgumentList "/portable","/config:tester.ini" `
        -Wait

    - name: Locate Backtest Report
      shell: pwsh
      run: |
        Write-Host ""
        Write-Host "================ BACKTEST RESULTS ================"

        $report = Get-ChildItem -Path "C:\" -Recurse -Filter "backtest*.html" -ErrorAction SilentlyContinue | Select-Object -First 1

        if($report){
            Write-Host "Backtest report found:"
            Write-Host $report.FullName

            $content = Get-Content $report.FullName

            $metrics = @(
              "Total Net Profit",
              "Gross Profit",
              "Gross Loss",
              "Profit Factor",
              "Expected Payoff",
              "Recovery Factor",
              "Sharpe Ratio",
              "Total Trades",
              "Short Trades",
              "Long Trades",
              "Balance Drawdown Maximal",
              "Equity Drawdown Maximal"
            )

            foreach($m in $metrics){
                $line = $content | Select-String $m | Select -First 1
                if($line){ Write-Host $line.Line }
            }

        } else {
            Write-Host "Backtest report not generated"
        }

    - name: Find EX5
      run: |
        $file = Get-ChildItem "$env:MQLPATH\Experts" -Filter *.ex5 -Recurse
        if($file){
          New-Item -ItemType Directory -Force compiled
          Copy-Item $file.FullName compiled\
        } else {
          Write-Error "Compilation failed"
          exit 1
        }

    - name: Upload EX5
      uses: actions/upload-artifact@v4
      with:
        name: compiled-ea
        path: compiled
