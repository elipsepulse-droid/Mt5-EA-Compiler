name: MT5 EA Compile

on:
  push:
    paths:
      - '**.mq5'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download MetaTrader 5
        run: |
          Invoke-WebRequest https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe -OutFile mt5setup.exe

      - name: Install MetaTrader 5
        run: |
          Start-Process -FilePath ".\mt5setup.exe" -ArgumentList "/auto" -Wait

      - name: Compile EA
        run: |
          $metaeditor = "C:\Program Files\MetaTrader 5\metaeditor64.exe"
          $mq5file = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Filter *.mq5 -Recurse | Select-Object -First 1
          & $metaeditor /compile:$mq5file.FullName /log

      - name: Upload EX5
        uses: actions/upload-artifact@v4
        with:
          name: compiled-ea
          path: |
            **/*.ex5
