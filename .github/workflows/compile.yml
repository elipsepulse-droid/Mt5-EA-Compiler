name: Compile MT5 EA

on:
  push:
    paths:
      - '**.mq5'
      - '.github/workflows/compile.yml'
  pull_request:
    paths:
      - '**.mq5'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download MetaTrader 5 Installer
      shell: pwsh
      run: |
        $url = "https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe"
        for ($i = 1; $i -le 3; $i++) {
          try {
            Write-Host "Download attempt $i..."
            Invoke-WebRequest $url -OutFile mt5setup.exe -TimeoutSec 120
            Write-Host "Downloaded OK."
            break
          } catch {
            Write-Warning "Attempt $i failed: $_"
            if ($i -eq 3) { throw "MT5 download failed after 3 attempts." }
            Start-Sleep -Seconds 10
          }
        }

    - name: Install MetaTrader 5
      shell: pwsh
      run: |
        Start-Process -FilePath .\mt5setup.exe -ArgumentList "/auto" -PassThru | Out-Null
        $editorPath = $null
        $timeout = 120
        $elapsed = 0
        while ($elapsed -lt $timeout) {
          Start-Sleep -Seconds 5
          $elapsed += 5
          $candidates = @(
            "C:\Program Files\MetaTrader 5\metaeditor64.exe",
            "$env:ProgramFiles\MetaTrader 5\metaeditor64.exe",
            "$env:LOCALAPPDATA\Programs\MetaTrader 5\metaeditor64.exe"
          )
          foreach ($c in $candidates) {
            if (Test-Path $c) { $editorPath = $c; break }
          }
          if ($editorPath) { break }
          Write-Host "Waiting for MetaEditor... ($elapsed/$timeout sec)"
        }
        if (-not $editorPath) {
          $found = Get-ChildItem "C:\" -Recurse -Filter "metaeditor64.exe" `
                                 -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($found) { $editorPath = $found.FullName }
        }
        if (-not $editorPath) {
          Write-Error "MetaEditor not found."
          exit 1
        }
        Write-Host "MetaEditor: $editorPath"
        $installDir = Split-Path $editorPath
        echo "METAEDITOR=$editorPath" >> $env:GITHUB_ENV
        echo "MT5_DIR=$installDir"    >> $env:GITHUB_ENV

    # ---------------------------------------------------------------
    # IMPORTANT: Repo stub is checked FIRST (Layer 1) — guaranteed
    # to always be available, skips all slow fallbacks.
    # Only falls back to MT5 install dir if stub is missing.
    # ---------------------------------------------------------------
    - name: Prepare MQL5 folder structure and Trade library
      shell: pwsh
      run: |
        $mql = "$env:APPDATA\MetaQuotes\Terminal\Common\MQL5"
        New-Item -ItemType Directory -Force "$mql\Experts"       | Out-Null
        New-Item -ItemType Directory -Force "$mql\Include\Trade" | Out-Null

        $libraryReady = $false

        # -------------------------------------------------------
        # LAYER 1 — Repo-committed stub (FASTEST, always present)
        # Path: .github/mql5-stub/Trade/Trade.mqh
        # -------------------------------------------------------
        $stubSrc = ".github\mql5-stub\Trade\Trade.mqh"
        if (Test-Path $stubSrc) {
          Write-Host "LAYER 1: Using repo-committed Trade.mqh stub..."
          Copy-Item -Force $stubSrc "$mql\Include\Trade\Trade.mqh"
          if (Test-Path "$mql\Include\Trade\Trade.mqh") {
            Write-Host "LAYER 1 SUCCESS - Trade.mqh is ready."
            $libraryReady = $true
          }
        } else {
          Write-Warning "LAYER 1: Stub not found at $stubSrc"
        }

        # -------------------------------------------------------
        # LAYER 2 — Official MT5 install dir (no C:\ scan)
        # -------------------------------------------------------
        if (-not $libraryReady) {
          Write-Host "LAYER 2: Trying MT5 install directory..."
          $stdLib = Join-Path $env:MT5_DIR "MQL5\Include"
          if (Test-Path $stdLib) {
            Write-Host "Copying from $stdLib"
            Copy-Item -Recurse -Force "$stdLib\*" "$mql\Include\"
            if (Test-Path "$mql\Include\Trade\Trade.mqh") {
              Write-Host "LAYER 2 SUCCESS."
              $libraryReady = $true
            }
          } else {
            Write-Warning "LAYER 2: MT5 standard library not found at $stdLib"
          }
        }

        # -------------------------------------------------------
        # LAYER 3 — Targeted search (only Trade folder, not C:\)
        # -------------------------------------------------------
        if (-not $libraryReady) {
          Write-Host "LAYER 3: Targeted search for Trade.mqh..."
          $searchRoots = @(
            "C:\Program Files\MetaTrader 5",
            "$env:LOCALAPPDATA\Programs\MetaTrader 5",
            "$env:APPDATA\MetaQuotes"
          )
          foreach ($root in $searchRoots) {
            if (-not (Test-Path $root)) { continue }
            $hit = Get-ChildItem $root -Recurse -Filter "Trade.mqh" `
                                  -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($hit) {
              $tradeDir   = Split-Path $hit.FullName
              $includeDir = Split-Path $tradeDir
              Write-Host "Found at: $($hit.FullName)"
              Copy-Item -Recurse -Force "$includeDir\*" "$mql\Include\" -ErrorAction SilentlyContinue
              if (Test-Path "$mql\Include\Trade\Trade.mqh") {
                Write-Host "LAYER 3 SUCCESS."
                $libraryReady = $true
                break
              }
            }
          }
        }

        # Final check — should never reach here if stub is committed
        if (-not (Test-Path "$mql\Include\Trade\Trade.mqh")) {
          Write-Error "FATAL: Trade\Trade.mqh could not be provided."
          exit 1
        }
        Write-Host "Trade\Trade.mqh confirmed ready."

        # Auto-detect EA .mq5 in repo root
        $ea = Get-ChildItem "." -Filter "*.mq5" | Select-Object -First 1
        if (-not $ea) {
          Write-Error "No .mq5 file found in repo root."
          exit 1
        }
        Write-Host "EA: $($ea.Name)"
        Copy-Item $ea.FullName "$mql\Experts\$($ea.Name)" -Force

        echo "MQLPATH=$mql"            >> $env:GITHUB_ENV
        echo "EA_NAME=$($ea.Name)"     >> $env:GITHUB_ENV
        echo "EA_BASE=$($ea.BaseName)" >> $env:GITHUB_ENV

    - name: Compile EA with MetaEditor
      shell: pwsh
      run: |
        $src = "$env:MQLPATH\Experts\$env:EA_NAME"
        $log = "$env:GITHUB_WORKSPACE\compile.log"
        Write-Host "Source : $src"
        Write-Host "Log    : $log"
        $proc = Start-Process -FilePath "$env:METAEDITOR" `
                              -ArgumentList "/compile:`"$src`"","/log:`"$log`"" `
                              -Wait -PassThru -NoNewWindow
        Write-Host "MetaEditor exit code: $($proc.ExitCode)"
        Start-Sleep -Seconds 3
        if (Test-Path $log) {
          Write-Host "--- RAW COMPILE LOG ---"
          Get-Content $log -Encoding Unicode
        } else {
          Write-Warning "No compile log produced."
        }

    - name: Parse Compile Results
      shell: pwsh
      run: |
        $log = "$env:GITHUB_WORKSPACE\compile.log"
        if (-not (Test-Path $log)) {
          Write-Warning "No compile log found."
          exit 0
        }
        $lines        = Get-Content $log -Encoding Unicode
        $errorLines   = $lines | Where-Object { $_ -match ": error" }
        $warningLines = $lines | Where-Object { $_ -match ": warning" }
        $errorCount   = @($errorLines).Count
        $warningCount = @($warningLines).Count

        $srcLines  = Get-Content "$env:MQLPATH\Experts\$env:EA_NAME" -ErrorAction SilentlyContinue
        $lineCount = @($srcLines).Count

        Write-Host ""
        Write-Host "================ CODE METRICS ================"
        Write-Host "Total lines     : $lineCount"
        Write-Host "Input params    : $(($srcLines | Select-String '^\s*input\s+').Count)"
        Write-Host "OrderSend calls : $(($srcLines | Select-String 'OrderSend\s*\(').Count)"
        Write-Host "BUY references  : $(($srcLines | Select-String 'ORDER_TYPE_BUY').Count)"
        Write-Host "SELL references : $(($srcLines | Select-String 'ORDER_TYPE_SELL').Count)"
        Write-Host "Include files   : $(($srcLines | Select-String '#include').Count)"

        Write-Host ""
        Write-Host "================ ERRORS ($errorCount) ================"
        foreach ($e in $errorLines) { Write-Host $e }

        Write-Host ""
        Write-Host "================ WARNINGS ($warningCount) ================"
        foreach ($w in $warningLines) { Write-Host $w }

        Write-Host ""
        Write-Host "================ SUMMARY ================"
        Write-Host "Errors   : $errorCount"
        Write-Host "Warnings : $warningCount"
        if ($errorCount -gt 0) {
          Write-Error "Compilation failed with $errorCount error(s)."
          exit 1
        }
        Write-Host "SUCCESS - Compiled with no errors."

    - name: Find and collect EX5
      shell: pwsh
      run: |
        $ex5 = $null
        foreach ($p in @("$env:MQLPATH\Experts","$env:APPDATA\MetaQuotes\Terminal\Common\MQL5\Experts")) {
          $f = Get-ChildItem $p -Filter "*.ex5" -Recurse -ErrorAction SilentlyContinue |
               Select-Object -First 1
          if ($f) { $ex5 = $f; break }
        }
        if ($ex5) {
          Write-Host "EX5 found: $($ex5.FullName)"
          New-Item -ItemType Directory -Force compiled | Out-Null
          Copy-Item $ex5.FullName "compiled\$env:EA_BASE.ex5" -Force
        } else {
          Write-Error "EX5 not found."
          exit 1
        }

    - name: Upload EX5 artifact
      uses: actions/upload-artifact@v4
      with:
        name: compiled-ea-${{ github.run_number }}
        path: compiled/
        if-no-files-found: error
