name: MT5 EA Compile + Analysis + Backtest

on:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: windows-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download MetaTrader 5
      shell: pwsh
      run: |
        Invoke-WebRequest https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe -OutFile mt5setup.exe

    - name: Install MetaTrader 5
      shell: pwsh
      run: |
        Start-Process -FilePath .\mt5setup.exe -ArgumentList "/auto" -Wait

    - name: Set MetaEditor and Terminal paths
      shell: pwsh
      run: |
        echo "METAEDITOR=C:\Program Files\MetaTrader 5\metaeditor64.exe" >> $env:GITHUB_ENV
        echo "TERMINAL=C:\Program Files\MetaTrader 5\terminal64.exe" >> $env:GITHUB_ENV

    - name: Prepare MT5 directories
      shell: pwsh
      run: |
        $mql="$env:USERPROFILE\AppData\Roaming\MetaQuotes\Terminal\Common\MQL5"

        New-Item -ItemType Directory -Force -Path "$mql\Experts"
        New-Item -ItemType Directory -Force -Path "$mql\Include"
        New-Item -ItemType Directory -Force -Path "$mql\Files"

        Copy-Item EA_DANE_AUTO_BOT2.mq5 "$mql\Experts\EA_DANE_AUTO_BOT2.mq5"

        echo "MQLPATH=$mql" >> $env:GITHUB_ENV

    - name: Create Strategy Tester configuration
      shell: pwsh
      run: |
        @"
        [Common]
        Login=0
        Password=
        Server=

        [Tester]
        TestExpert=EA_DANE_AUTO_BOT2
        Symbol=XAUUSD
        Period=M5
        Model=0
        Optimization=1
        FromDate=2022.01.01
        ToDate=2025.01.01
        Deposit=10000
        Currency=USD
        Leverage=100
        ExecutionMode=0
        ReplaceReport=1
        Report=backtest_report
        ShutdownTerminal=1
        "@ | Out-File tester.ini -Encoding ASCII

    - name: Compile EA
      shell: pwsh
      run: |
        & "$env:METAEDITOR" /compile:"$env:MQLPATH\Experts\EA_DANE_AUTO_BOT2.mq5" /log:compile.log

    - name: Show compile log
      shell: pwsh
      run: |
        Get-Content compile.log

    - name: Static Code Analysis
      shell: pwsh
      run: |

        $file="$env:MQLPATH\Experts\EA_DANE_AUTO_BOT2.mq5"
        $content=Get-Content $file
        $text=$content -join "`n"

        $lines=$content.Count
        $functions=[regex]::Matches($text,"(void|int|double|bool|string|datetime)\s+[A-Za-z0-9_]+\s*\(").Count
        $classes=[regex]::Matches($text,"\bclass\s+[A-Za-z0-9_]+").Count
        $structs=[regex]::Matches($text,"\bstruct\s+[A-Za-z0-9_]+").Count
        $enums=[regex]::Matches($text,"\benum\s+[A-Za-z0-9_]+").Count
        $globals=[regex]::Matches($text,"^(int|double|bool|string|datetime)\s+[A-Za-z0-9_]+\s*=").Count
        $inputs=[regex]::Matches($text,"\binput\s+").Count
        $includes=[regex]::Matches($text,"#include").Count
        $libraries=[regex]::Matches($text,"#import").Count
        $resources=[regex]::Matches($text,"#resource").Count

        $orderSend=[regex]::Matches($text,"OrderSend\s*\(").Count
        $orderSendAsync=[regex]::Matches($text,"OrderSendAsync\s*\(").Count
        $buy=[regex]::Matches($text,"ORDER_TYPE_BUY|trade\.Buy").Count
        $sell=[regex]::Matches($text,"ORDER_TYPE_SELL|trade\.Sell").Count
        $pending=[regex]::Matches($text,"ORDER_TYPE_BUY_LIMIT|ORDER_TYPE_SELL_LIMIT|ORDER_TYPE_BUY_STOP|ORDER_TYPE_SELL_STOP").Count
        $close=[regex]::Matches($text,"PositionClose").Count
        $tradereq=[regex]::Matches($text,"MqlTradeRequest").Count
        $risk=[regex]::Matches($text,"risk|lot|stoploss|takeprofit").Count

        $indicators=[regex]::Matches($text,"iMA|iRSI|iMACD|iBands|iATR").Count
        $tradeclass=[regex]::Matches($text,"CTrade").Count
        $timer=[regex]::Matches($text,"EventSetTimer").Count

        $oninit=[regex]::Matches($text,"OnInit").Count
        $ondeinit=[regex]::Matches($text,"OnDeinit").Count
        $ontick=[regex]::Matches($text,"OnTick").Count
        $ontimer=[regex]::Matches($text,"OnTimer").Count
        $ontrade=[regex]::Matches($text,"OnTrade").Count

        $log=Get-Content compile.log
        $errorLines=$log | Select-String -Pattern "error"
        $warningLines=$log | Select-String -Pattern "warning"

        $errorCount=$errorLines.Count
        $warningCount=$warningLines.Count

        Write-Host ""
        Write-Host "================ CODE STRUCTURE METRICS ================"
        Write-Host "Total lines of code: $lines"
        Write-Host "Number of functions: $functions"
        Write-Host "Number of classes: $classes"
        Write-Host "Number of structures: $structs"
        Write-Host "Number of enumerations: $enums"
        Write-Host "Number of global variables: $globals"
        Write-Host "Number of input parameters: $inputs"
        Write-Host "Number of include files: $includes"
        Write-Host "Number of libraries used: $libraries"
        Write-Host "Number of resource files: $resources"

        Write-Host ""
        Write-Host "================ ERROR INFORMATION ================"
        foreach($e in $errorLines){ Write-Host $e.Line }

        Write-Host ""
        Write-Host "================ WARNING INFORMATION ================"
        foreach($w in $warningLines){ Write-Host $w.Line }

        Write-Host ""
        Write-Host "================ TRADING RELATED DETECTION ================"
        Write-Host "OrderSend usage: $orderSend"
        Write-Host "OrderSendAsync usage: $orderSendAsync"
        Write-Host "Buy order functions: $buy"
        Write-Host "Sell order functions: $sell"
        Write-Host "Pending order functions: $pending"
        Write-Host "PositionClose calls: $close"
        Write-Host "Trade request structures: $tradereq"
        Write-Host "Risk management variables: $risk"

        Write-Host ""
        Write-Host "================ FUNCTION USAGE ================"
        Write-Host "Indicator calls: $indicators"
        Write-Host "Trade class usage: $tradeclass"
        Write-Host "Timer functions: $timer"
        Write-Host "OnInit events: $oninit"
        Write-Host "OnDeinit events: $ondeinit"
        Write-Host "OnTick events: $ontick"
        Write-Host "OnTimer events: $ontimer"
        Write-Host "OnTrade events: $ontrade"

        Write-Host ""
        Write-Host "================ FINAL COMPILATION SUMMARY ================"
        Write-Host "Total errors: $errorCount"
        Write-Host "Total warnings: $warningCount"

        if($errorCount -eq 0){
          Write-Host "Successful compilation message: Compilation finished without critical errors"
        }

    - name: Run Strategy Tester
      shell: pwsh
      run: |
        & "$env:TERMINAL" /portable /config:tester.ini

    - name: Collect Backtest Results
      shell: pwsh
      run: |

        New-Item -ItemType Directory -Force results

        $testerPath="$env:USERPROFILE\AppData\Roaming\MetaQuotes\Terminal\Common\Tester"

        if(Test-Path $testerPath){
            Get-ChildItem $testerPath -Recurse -Include *.html,*.xml,*.csv |
            Copy-Item -Destination results -Force
        }

        Get-ChildItem results

    - name: Locate EX5
      shell: pwsh
      run: |
        $file=Get-ChildItem "$env:MQLPATH\Experts" -Filter *.ex5 -Recurse

        if($file){
          Write-Host ".ex5 file generation confirmation: EX5 file created"
          New-Item -ItemType Directory -Force compiled
          Copy-Item $file.FullName compiled\
        }
        else{
          Write-Error "Compilation failed"
          exit 1
        }

    - name: Upload compiled EA
      uses: actions/upload-artifact@v4
      with:
        name: compiled-ex5
        path: compiled

    - name: Upload Backtest Results
      uses: actions/upload-artifact@v4
      with:
        name: backtest-results
        path: results
        if-no-files-found: ignore
