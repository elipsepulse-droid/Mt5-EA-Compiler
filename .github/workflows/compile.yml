name: Compile MT5 EA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download MetaTrader 5
      run: |
        Invoke-WebRequest https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe -OutFile mt5setup.exe

    - name: Install MT5
      run: |
        Start-Process -FilePath .\mt5setup.exe -ArgumentList "/auto" -Wait

    - name: Set MetaEditor
      run: |
        echo "METAEDITOR=C:\Program Files\MetaTrader 5\metaeditor64.exe" >> $env:GITHUB_ENV
        echo "TERMINAL=C:\Program Files\MetaTrader 5\terminal64.exe" >> $env:GITHUB_ENV

    - name: Download MQL5 Include Library
      run: |
        git clone https://github.com/EA31337/EA31337-classes.git mql_lib

    - name: Prepare MQL5 folders
      run: |
        $mql="$env:USERPROFILE\AppData\Roaming\MetaQuotes\Terminal\Common\MQL5"
        New-Item -ItemType Directory -Force -Path "$mql\Experts"
        New-Item -ItemType Directory -Force -Path "$mql\Include"

        Copy-Item EA_DANE_AUTO_BOT2.mq5 "$mql\Experts\EA_DANE_AUTO_BOT2.mq5"
        Copy-Item -Recurse mql_lib\* "$mql\Include"

        echo "MQLPATH=$mql" >> $env:GITHUB_ENV

    - name: Compile EA
      run: |
        & "$env:METAEDITOR" /compile:"$env:MQLPATH\Experts\EA_DANE_AUTO_BOT2.mq5" /log:compile.log

    - name: Show log
      run: |
        Get-Content compile.log

    - name: Backtesting Configuration
      shell: pwsh
      run: |
        $tester = @"
[Common]
Login=0
Password=
Server=
TestExpert=EA_DANE_AUTO_BOT2
Symbol=XAUUSD
Period=M5
Model=0
Optimization=0
FromDate=2022.01.01
ToDate=2025.01.01
Deposit=10000
Currency=USD
Leverage=100
Report=backtest_report
ReplaceReport=1
ShutdownTerminal=1
"@

        $tester | Out-File tester.ini -Encoding ASCII

    - name: Run Strategy Tester
      shell: pwsh
      run: |
        & "$env:TERMINAL" /portable /config:tester.ini
        Start-Sleep -Seconds 30

    - name: Parse Backtest Results
      shell: pwsh
      run: |

        Write-Host ""
        Write-Host "================ BACKTEST SUMMARY ================"

        $report = Get-ChildItem -Recurse -Filter "backtest_report*.html" -ErrorAction SilentlyContinue

        if($report){

          $content = Get-Content $report.FullName

          function Extract($pattern){
            $match = $content | Select-String $pattern | Select -First 1
            if($match){ return $match.Line } else { return "Data not found" }
          }

          Write-Host "Symbol: XAUUSD"
          Write-Host "Timeframe: M5"
          Write-Host "Test Period: 2022.01.01 - 2025.01.01"

          Write-Host ""
          Write-Host "--------------- PERFORMANCE METRICS ---------------"
          Write-Host (Extract "Total Net Profit")
          Write-Host (Extract "Gross Profit")
          Write-Host (Extract "Gross Loss")
          Write-Host (Extract "Profit Factor")
          Write-Host (Extract "Expected Payoff")
          Write-Host (Extract "Recovery Factor")
          Write-Host (Extract "Sharpe Ratio")

          Write-Host ""
          Write-Host "--------------- TRADE STATISTICS ---------------"
          Write-Host (Extract "Total Trades")
          Write-Host (Extract "Short Trades")
          Write-Host (Extract "Long Trades")
          Write-Host (Extract "Profit Trades")
          Write-Host (Extract "Loss Trades")

          Write-Host ""
          Write-Host "--------------- RISK ANALYSIS ---------------"
          Write-Host (Extract "Balance Drawdown Maximal")
          Write-Host (Extract "Equity Drawdown Maximal")
          Write-Host (Extract "Balance Drawdown Relative")
          Write-Host (Extract "Equity Drawdown Relative")

          Write-Host ""
          Write-Host "--------------- EXECUTION DETAILS ---------------"
          Write-Host (Extract "Ticks modelled")
          Write-Host (Extract "Modeling quality")
          Write-Host (Extract "Spread")

        }
        else{
          Write-Host "Backtest report not found"
        }

    - name: Find EX5
      run: |
        $file = Get-ChildItem "$env:MQLPATH\Experts" -Filter *.ex5 -Recurse
        if($file){
          New-Item -ItemType Directory -Force compiled
          Copy-Item $file.FullName compiled\
        } else {
          Write-Error "Compilation failed"
          exit 1
        }

    - name: Upload EX5
      uses: actions/upload-artifact@v4
      with:
        name: compiled-ea
        path: compiled
