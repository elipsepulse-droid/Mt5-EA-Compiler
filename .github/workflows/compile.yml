name: Compile MT5 EA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download MetaTrader 5
      run: |
        Invoke-WebRequest https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe -OutFile mt5setup.exe

    - name: Install MT5
      run: |
        Start-Process -FilePath .\mt5setup.exe -ArgumentList "/auto" -Wait

    - name: Set MetaEditor
      run: |
        echo "METAEDITOR=C:\Program Files\MetaTrader 5\metaeditor64.exe" >> $env:GITHUB_ENV

    - name: Download MQL5 Include Library
      run: |
        git clone https://github.com/EA31337/EA31337-classes.git mql_lib

    - name: Prepare MQL5 folders
      run: |
        $mql="$env:USERPROFILE\AppData\Roaming\MetaQuotes\Terminal\Common\MQL5"
        New-Item -ItemType Directory -Force -Path "$mql\Experts"
        New-Item -ItemType Directory -Force -Path "$mql\Include"

        Copy-Item EA_DANE_AUTO_BOT2.mq5 "$mql\Experts\EA_DANE_AUTO_BOT2.mq5"
        Copy-Item -Recurse mql_lib\* "$mql\Include"

        echo "MQLPATH=$mql" >> $env:GITHUB_ENV

    - name: Compile EA
      run: |
        & "$env:METAEDITOR" /compile:"$env:MQLPATH\Experts\EA_DANE_AUTO_BOT2.mq5" /log:compile.log

    - name: Show log
      run: |
        Get-Content compile.log

    - name: Backtesting Configuration Summary
      shell: pwsh
      run: |

        Write-Host ""
        Write-Host "================ BACKTEST CONFIGURATION ================"

        Write-Host "Symbol: XAUUSD"
        Write-Host "Timeframe: M5"
        Write-Host "Model: Every Tick"
        Write-Host "Testing Period: 2022.01.01 - 2025.01.01"
        Write-Host "Initial Deposit: 10000 USD"
        Write-Host "Leverage: 1:100"

        Write-Host ""
        Write-Host "================ EXPECTED BACKTEST OUTPUT ================"

        Write-Host "Performance Metrics:"
        Write-Host "- Total Net Profit"
        Write-Host "- Gross Profit"
        Write-Host "- Gross Loss"
        Write-Host "- Profit Factor"
        Write-Host "- Expected Payoff"
        Write-Host "- Recovery Factor"
        Write-Host "- Sharpe Ratio"

        Write-Host ""
        Write-Host "Trade Statistics:"
        Write-Host "- Total Trades"
        Write-Host "- Long Trades"
        Write-Host "- Short Trades"
        Write-Host "- Winning Trades"
        Write-Host "- Losing Trades"

        Write-Host ""
        Write-Host "Risk Analysis:"
        Write-Host "- Max Balance Drawdown"
        Write-Host "- Max Equity Drawdown"
        Write-Host "- Relative Drawdown"

        Write-Host ""
        Write-Host "Execution Information:"
        Write-Host "- Spread Used"
        Write-Host "- Tick Model"
        Write-Host "- Modeling Quality"

    - name: Find EX5
      run: |
        $file = Get-ChildItem "$env:MQLPATH\Experts" -Filter *.ex5 -Recurse
        if($file){
          New-Item -ItemType Directory -Force compiled
          Copy-Item $file.FullName compiled\
        } else {
          Write-Error "Compilation failed"
          exit 1
        }

    - name: Upload EX5
      uses: actions/upload-artifact@v4
      with:
        name: compiled-ea
        path: compiled
