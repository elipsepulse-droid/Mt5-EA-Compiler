name: MT5 EA Compile

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download MetaTrader 5
      run: |
        Invoke-WebRequest https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe -OutFile mt5setup.exe

    - name: Install MetaTrader 5
      run: |
        Start-Process -FilePath .\mt5setup.exe -ArgumentList "/auto" -Wait

    - name: Locate MetaEditor
      run: |
        $path="C:\Program Files\MetaTrader 5\metaeditor64.exe"
        echo "METAEDITOR=$path" >> $env:GITHUB_ENV

    - name: Locate MT5 Data Folder
      run: |
        $terminalRoot="$env:APPDATA\MetaQuotes\Terminal"
        $terminal=Get-ChildItem $terminalRoot | Select-Object -First 1
        $mql="$terminalRoot\$terminal\MQL5"
        echo "MQLPATH=$mql" >> $env:GITHUB_ENV

    - name: Prepare EA source
      run: |
        mkdir "$env:MQLPATH\Experts" -Force
        Copy-Item EA_DANE_AUTO_BOT2.mq5 "$env:MQLPATH\Experts\"

    - name: Compile MQ5
      run: |
        & "$env:METAEDITOR" /compile:"$env:MQLPATH\Experts\EA_DANE_AUTO_BOT2.mq5" /log:compile.log

    - name: Show compiler log
      run: |
        Get-Content compile.log

    - name: Find EX5
      run: |
        $file = Get-ChildItem "$env:MQLPATH\Experts" -Recurse -Filter *.ex5
        if($file){
          mkdir compiled
          Copy-Item $file.FullName compiled\
        }
        else{
          Write-Error "Compilation failed"
          exit 1
        }

    - name: Upload EX5
      uses: actions/upload-artifact@v4
      with:
        name: compiled-ea
        path: compiled
