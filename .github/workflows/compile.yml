name: Compile MT5 EA

on:
  push:
    paths:
      - '**.mq5'
      - '.github/workflows/compile.yml'
  pull_request:
    paths:
      - '**.mq5'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download MetaTrader 5 Installer
      shell: pwsh
      run: |
        $url = "https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe"
        for ($i = 1; $i -le 3; $i++) {
          try {
            Write-Host "Download attempt $i..."
            Invoke-WebRequest $url -OutFile mt5setup.exe -TimeoutSec 120
            Write-Host "Downloaded OK."
            break
          } catch {
            Write-Warning "Attempt $i failed: $_"
            if ($i -eq 3) { throw "MT5 download failed." }
            Start-Sleep -Seconds 10
          }
        }

    - name: Install MetaTrader 5
      shell: pwsh
      run: |
        Start-Process -FilePath .\mt5setup.exe -ArgumentList "/auto" -PassThru | Out-Null
        $editorPath = $null
        $timeout = 120
        $elapsed = 0
        while ($elapsed -lt $timeout) {
          Start-Sleep -Seconds 5
          $elapsed += 5
          $candidates = @(
            "C:\Program Files\MetaTrader 5\metaeditor64.exe",
            "$env:ProgramFiles\MetaTrader 5\metaeditor64.exe",
            "$env:LOCALAPPDATA\Programs\MetaTrader 5\metaeditor64.exe"
          )
          foreach ($c in $candidates) {
            if (Test-Path $c) { $editorPath = $c; break }
          }
          if ($editorPath) { break }
          Write-Host "Waiting for MetaEditor... ($elapsed/$timeout sec)"
        }
        if (-not $editorPath) {
          $found = Get-ChildItem "C:\" -Recurse -Filter "metaeditor64.exe" `
                                 -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($found) { $editorPath = $found.FullName }
        }
        if (-not $editorPath) {
          Write-Error "MetaEditor not found."
          exit 1
        }
        Write-Host "MetaEditor: $editorPath"
        $installDir = Split-Path $editorPath
        echo "METAEDITOR=$editorPath" >> $env:GITHUB_ENV
        echo "MT5_DIR=$installDir"    >> $env:GITHUB_ENV

    # ---------------------------------------------------------------
    # STEP 1: Run MetaEditor once on a dummy file
    # This forces MetaEditor to create its hashed terminal data folder
    # under AppData\Roaming\MetaQuotes\Terminal\<HASH>\MQL5\
    # We don't care if this compile fails — we just need the folders
    # ---------------------------------------------------------------
    - name: Initialize MetaEditor terminal data folder
      shell: pwsh
      run: |
        # Create a tiny dummy MQ5 file to trigger MetaEditor init
        $dummyPath = "$env:TEMP\dummy_init.mq5"
        Set-Content -Path $dummyPath -Value "void OnTick(){}"

        Write-Host "Running MetaEditor to initialize terminal folders..."
        $proc = Start-Process -FilePath "$env:METAEDITOR" `
                              -ArgumentList "/compile:`"$dummyPath`"" `
                              -Wait -PassThru -NoNewWindow
        Write-Host "Init exit code: $($proc.ExitCode) (non-zero is OK here)"

        # Wait a moment for folder creation to complete
        Start-Sleep -Seconds 5

        # Show what terminal folders now exist
        $terminalRoot = "$env:APPDATA\MetaQuotes\Terminal"
        Write-Host "Terminal folders created:"
        if (Test-Path $terminalRoot) {
          Get-ChildItem $terminalRoot -Directory | ForEach-Object {
            Write-Host "  $($_.FullName)"
          }
        } else {
          Write-Warning "Terminal root not found at $terminalRoot"
        }

    # ---------------------------------------------------------------
    # STEP 2: Now copy Trade.mqh into EVERY terminal folder
    # The hashed folder now exists after the dummy compile above
    # ---------------------------------------------------------------
    - name: Deploy Trade.mqh to all terminal Include folders
      shell: pwsh
      run: |
        # Verify all stub files exist in repo
        $stubs = @(
          ".github\mql5-stub\Trade\Trade.mqh",
          ".github\mql5-stub\Trade\PositionInfo.mqh",
          ".github\mql5-stub\Trade\OrderInfo.mqh",
          ".github\mql5-stub\Trade\AccountInfo.mqh"
        )
        foreach ($s in $stubs) {
          if (-not (Test-Path $s)) {
            Write-Error "Stub not found: $s — did you commit it?"
            exit 1
          }
          Write-Host "Stub found: $s"
        }

        $copiedCount = 0

        # All destination roots to copy into
        $destRoots = [System.Collections.Generic.List[string]]::new()

        # Common MQL5
        $destRoots.Add("$env:APPDATA\MetaQuotes\Terminal\Common\MQL5\Include\Trade")

        # All terminal hash folders (created by dummy compile)
        $terminalRoot = "$env:APPDATA\MetaQuotes\Terminal"
        if (Test-Path $terminalRoot) {
          $dirs = Get-ChildItem $terminalRoot -Directory -ErrorAction SilentlyContinue
          foreach ($dir in $dirs) {
            $destRoots.Add("$($dir.FullName)\MQL5\Include\Trade")
          }
        }

        # MetaEditor install dir
        $destRoots.Add((Join-Path $env:MT5_DIR "MQL5\Include\Trade"))

        # Program Files MT5
        if (Test-Path "C:\Program Files\MetaTrader 5") {
          $destRoots.Add("C:\Program Files\MetaTrader 5\MQL5\Include\Trade")
        }

        # Copy ALL stubs to ALL locations
        foreach ($dest in $destRoots) {
          New-Item -ItemType Directory -Force $dest | Out-Null
          foreach ($stub in $stubs) {
            $fileName = Split-Path $stub -Leaf
            Copy-Item -Force $stub "$dest\$fileName"
          }
          Write-Host "Deployed all stubs to: $dest"
          $copiedCount++
        }

        Write-Host "All 4 stubs deployed to $copiedCount locations."

    # ---------------------------------------------------------------
    # STEP 3: Copy EA to Experts folder and set env vars
    # ---------------------------------------------------------------
    - name: Prepare EA source
      shell: pwsh
      run: |
        $mql = "$env:APPDATA\MetaQuotes\Terminal\Common\MQL5"
        New-Item -ItemType Directory -Force "$mql\Experts" | Out-Null

        $ea = Get-ChildItem "." -Filter "*.mq5" | Select-Object -First 1
        if (-not $ea) {
          Write-Error "No .mq5 file found in repo root."
          exit 1
        }
        Write-Host "EA: $($ea.Name)"
        Copy-Item $ea.FullName "$mql\Experts\$($ea.Name)" -Force

        echo "MQLPATH=$mql"            >> $env:GITHUB_ENV
        echo "EA_NAME=$($ea.Name)"     >> $env:GITHUB_ENV
        echo "EA_BASE=$($ea.BaseName)" >> $env:GITHUB_ENV

    # ---------------------------------------------------------------
    # STEP 4: Real compile
    # ---------------------------------------------------------------
    - name: Compile EA with MetaEditor
      shell: pwsh
      run: |
        $src = "$env:MQLPATH\Experts\$env:EA_NAME"
        $log = "$env:GITHUB_WORKSPACE\compile.log"
        Write-Host "Source : $src"
        Write-Host "Log    : $log"
        $proc = Start-Process -FilePath "$env:METAEDITOR" `
                              -ArgumentList "/compile:`"$src`"","/log:`"$log`"" `
                              -Wait -PassThru -NoNewWindow
        Write-Host "MetaEditor exit code: $($proc.ExitCode)"
        Start-Sleep -Seconds 3
        if (Test-Path $log) {
          Write-Host "--- RAW COMPILE LOG ---"
          Get-Content $log -Encoding Unicode
        } else {
          Write-Warning "No compile log produced."
        }

    - name: Parse Compile Results
      shell: pwsh
      run: |
        $log = "$env:GITHUB_WORKSPACE\compile.log"
        if (-not (Test-Path $log)) {
          Write-Warning "No compile log found."
          exit 0
        }
        $lines        = Get-Content $log -Encoding Unicode
        $errorLines   = $lines | Where-Object { $_ -match ": error" }
        $warningLines = $lines | Where-Object { $_ -match ": warning" }
        $errorCount   = @($errorLines).Count
        $warningCount = @($warningLines).Count

        $srcLines  = Get-Content "$env:MQLPATH\Experts\$env:EA_NAME" -ErrorAction SilentlyContinue
        $lineCount = @($srcLines).Count

        Write-Host ""
        Write-Host "================ CODE METRICS ================"
        Write-Host "Total lines     : $lineCount"
        Write-Host "Input params    : $(($srcLines | Select-String 'input ').Count)"
        Write-Host "BUY references  : $(($srcLines | Select-String 'ORDER_TYPE_BUY').Count)"
        Write-Host "SELL references : $(($srcLines | Select-String 'ORDER_TYPE_SELL').Count)"
        Write-Host "Include files   : $(($srcLines | Select-String '#include').Count)"

        Write-Host ""
        Write-Host "================ ERRORS ($errorCount) ================"
        foreach ($e in $errorLines) { Write-Host $e }

        Write-Host ""
        Write-Host "================ WARNINGS ($warningCount) ================"
        foreach ($w in $warningLines) { Write-Host $w }

        Write-Host ""
        Write-Host "================ SUMMARY ================"
        Write-Host "Errors   : $errorCount"
        Write-Host "Warnings : $warningCount"
        if ($errorCount -gt 0) {
          Write-Error "Compilation failed with $errorCount error(s)."
          exit 1
        }
        Write-Host "SUCCESS - Compiled with no errors."

    - name: Find and collect EX5
      shell: pwsh
      run: |
        $ex5 = $null
        $searchPaths = @(
          "$env:MQLPATH\Experts",
          "$env:APPDATA\MetaQuotes\Terminal\Common\MQL5\Experts"
        )
        foreach ($p in $searchPaths) {
          $f = Get-ChildItem $p -Filter "*.ex5" -Recurse -ErrorAction SilentlyContinue |
               Select-Object -First 1
          if ($f) { $ex5 = $f; break }
        }
        if ($ex5) {
          Write-Host "EX5 found: $($ex5.FullName)"
          New-Item -ItemType Directory -Force compiled | Out-Null
          Copy-Item $ex5.FullName "compiled\$env:EA_BASE.ex5" -Force
        } else {
          Write-Error "EX5 not found."
          exit 1
        }

    - name: Upload EX5 artifact
      uses: actions/upload-artifact@v4
      with:
        name: compiled-ea-${{ github.run_number }}
        path: compiled/
        if-no-files-found: error
